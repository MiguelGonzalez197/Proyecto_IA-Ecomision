version: waste-taxonomy-v1

label_spaces:
  material_primary:
    - PET
    - HDPE
    - PP
    - PS
    - EPS
    - PAPER
    - CARDBOARD
    - GLASS
    - ALUMINUM
    - STEEL
    - MULTILAYER
    - TETRA_PAK
    - ORGANIC
    - MIXED
    - UNKNOWN
  state_cleanliness:
    - clean
    - lightly_soiled
    - contaminated
    - uncertain
  state_wetness:
    - dry
    - humid
    - wet
    - uncertain
  state_food_residue:
    - none
    - trace
    - visible
    - heavy
    - uncertain
  state_liquid:
    - none
    - drops
    - visible
    - pooled
    - uncertain
  deformation:
    - none
    - slight
    - folded
    - crushed
    - wrinkled
    - torn
  visible_part:
    - outer_full
    - inner_view
    - opening_neck
    - bottom_view
    - back_side
    - both_faces
    - close_texture
    - partial
  background_complexity:
    - simple
    - medium
    - complex
  occlusion:
    - none
    - partial
    - severe
  ambiguity:
    - low
    - medium
    - high
  target_bin:
    - WHITE
    - BLACK
    - GREEN

object_classes:
  - id: plastic_bottle
    display_name: Botella plastica
    detector_group: rigid_plastic
    material_candidates: [PET, HDPE]
    likely_bins: [WHITE, BLACK]
    required_view_slots: [outer_full, opening_neck, inner_view, bottom_view]
    ambiguity_triggers: [transparent_liquid, sticky_residue, partial_view]
  - id: plastic_container
    display_name: Envase plastico
